stages:
  - lint
  - test
  - build

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  CARGO_INCREMENTAL: "0"
  CARGO_NET_RETRY: "10"
  RUST_BACKTRACE: "short"

# ── Lint ─────────────────────────────────────────────────────────────────────

rust-lint:
  stage: lint
  image: rust:1.91
  before_script:
    - rustup target add wasm32-wasip2
    - rustup component add clippy rustfmt
  script:
    - cargo fmt --all --check
    - cargo clippy --workspace -- -D warnings
    - cd components
    - cargo fmt --check
    - HOST_TARGET=$(rustc -vV | grep host | awk '{print $2}')
    - cargo clippy --target "$HOST_TARGET" -- -D warnings
  cache:
    key: rust-${CI_COMMIT_REF_SLUG}
    policy: pull-push
    paths:
      - .cargo/
      - target/
      - components/target/

opa-lint:
  stage: lint
  image:
    name: openpolicyagent/opa:latest-debug
    entrypoint: [""]
  script:
    - |
      BAD=""
      for f in $(find . -name '*.rego'); do
        if ! opa fmt --fail "$f"; then
          BAD="$BAD $f"
        fi
      done
      if [ -n "$BAD" ]; then
        echo "opa fmt needed on:$BAD"
        exit 1
      fi

# ── Test ─────────────────────────────────────────────────────────────────────

rust-test:
  stage: test
  image: rust:1.91
  before_script:
    - rustup target add wasm32-wasip2
  script:
    - cargo test --workspace
    - HOST_TARGET=$(rustc -vV | grep host | awk '{print $2}')
    - cd components && cargo test --workspace --target "$HOST_TARGET"
  cache:
    key: rust-${CI_COMMIT_REF_SLUG}
    policy: pull
    paths:
      - .cargo/
      - target/
      - components/target/

opa-test:
  stage: test
  image:
    name: openpolicyagent/opa:latest-debug
    entrypoint: [""]
  script:
    - |
      for d in examples/*/; do
        if ls "$d"*_test.rego >/dev/null 2>&1; then
          echo "=== $d ==="
          opa test "$d" -v
        fi
      done

# ── Build ────────────────────────────────────────────────────────────────────

build-plugins:
  stage: build
  image: rust:1.91
  before_script:
    - rustup target add wasm32-wasip2
  script:
    - cd components
    - cargo build --release
  artifacts:
    paths:
      - components/target/wasm32-wasip2/release/*.wasm
    expire_in: 1 week
  cache:
    key: rust-${CI_COMMIT_REF_SLUG}
    policy: pull-push
    paths:
      - .cargo/
      - components/target/

build-orchestrator:
  stage: build
  image: rust:1.91
  script:
    - mkdir -p bin
    - cargo build --release -p wasm-af-orchestrator
    - cp target/release/orchestrator bin/orchestrator
  artifacts:
    paths:
      - bin/orchestrator
    expire_in: 1 week
  cache:
    key: rust-${CI_COMMIT_REF_SLUG}
    policy: pull-push
    paths:
      - .cargo/
      - target/
