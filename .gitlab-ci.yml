stages:
  - lint
  - test
  - build

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  GOPATH: ${CI_PROJECT_DIR}/.go

# ── Lint ─────────────────────────────────────────────────────────────────────

go-lint:
  stage: lint
  image: golang:1.23
  script:
    - cd cmd/webhook-gateway
    - test -z "$(gofmt -l .)" || (echo "gofmt needed on:" && gofmt -l . && exit 1)
    - go vet ./...
    - go mod tidy
    - git diff --exit-code go.mod go.sum || (echo "go.mod/go.sum not tidy" && exit 1)

rust-lint:
  stage: lint
  image: rust:latest
  before_script:
    - rustup target add wasm32-wasip2
    - rustup component add clippy rustfmt
  script:
    - cd components
    - cargo fmt --check
    - HOST_TARGET=$(rustc -vV | grep host | awk '{print $2}')
    - cargo clippy --target "$HOST_TARGET" -- -D warnings
  cache:
    key: rust-${CI_COMMIT_REF_SLUG}
    paths:
      - .cargo/
      - components/target/

opa-lint:
  stage: lint
  image:
    name: openpolicyagent/opa:latest-debug
    entrypoint: [""]
  script:
    - |
      BAD=""
      for f in $(find . -name '*.rego'); do
        if ! opa fmt --fail "$f"; then
          BAD="$BAD $f"
        fi
      done
      if [ -n "$BAD" ]; then
        echo "opa fmt needed on:$BAD"
        exit 1
      fi

# ── Test ─────────────────────────────────────────────────────────────────────

go-test:
  stage: test
  image: golang:1.23
  script:
    - cd cmd/webhook-gateway
    - go build ./...

rust-test:
  stage: test
  image: rust:latest
  before_script:
    - rustup target add wasm32-wasip2
  script:
    - cd components
    - HOST_TARGET=$(rustc -vV | grep host | awk '{print $2}')
    - cargo test --target "$HOST_TARGET"
  cache:
    key: rust-${CI_COMMIT_REF_SLUG}
    paths:
      - .cargo/
      - components/target/

opa-test:
  stage: test
  image:
    name: openpolicyagent/opa:latest-debug
    entrypoint: [""]
  script:
    - |
      for d in examples/*/; do
        if ls "$d"*_test.rego >/dev/null 2>&1; then
          echo "=== $d ==="
          opa test "$d" -v
        fi
      done

# ── Build ────────────────────────────────────────────────────────────────────

build-plugins:
  stage: build
  image: rust:latest
  before_script:
    - rustup target add wasm32-wasip2
  script:
    - cd components
    - cargo build --release
  artifacts:
    paths:
      - components/target/wasm32-wasip2/release/*.wasm
    expire_in: 1 week
  cache:
    key: rust-${CI_COMMIT_REF_SLUG}
    paths:
      - .cargo/
      - components/target/

build-orchestrator:
  stage: build
  image: rust:latest
  script:
    - mkdir -p bin
    - cargo build --release -p orchestrator
    - cp target/release/orchestrator bin/orchestrator
  artifacts:
    paths:
      - bin/orchestrator
    expire_in: 1 week

build-webhook-gateway:
  stage: build
  image: golang:1.23
  script:
    - mkdir -p bin
    - cd cmd/webhook-gateway
    - go build -o ../../bin/webhook-gateway .
  artifacts:
    paths:
      - bin/webhook-gateway
    expire_in: 1 week
