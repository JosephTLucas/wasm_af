apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: wasm-af-demo
  annotations:
    version: v0.1.0-local
    description: >
      wasm-af local development manifest. References components by file:// path
      so no OCI registry is required. Providers are started separately via wash.
spec:
  components:

    - name: policy-engine
      type: component
      properties:
        # file:// reference — wasmCloud reads the WASM binary directly from disk.
        # No registry, no push step required.
        image: file://./components/target/wasm32-wasip2/release/policy_engine.wasm
        config:
          - name: policy-rules-config
      traits:
        - type: spreadscaler
          properties:
            replicas: 1

    - name: web-search
      type: component
      properties:
        image: file://./components/target/wasm32-wasip2/release/web_search.wasm
        config:
          - name: web-search-config
      traits:
        - type: spreadscaler
          properties:
            replicas: 0
        - type: link
          properties:
            name: default
            target:
              name: http-client
            namespace: wasi
            package: http
            interfaces: [outgoing-handler]

    - name: summarizer
      type: component
      properties:
        image: file://./components/target/wasm32-wasip2/release/summarizer.wasm
      traits:
        - type: spreadscaler
          properties:
            replicas: 0
        - type: link
          properties:
            name: default
            target:
              name: llm-inference
              config:
                - name: llm-config
              secrets:
                - name: llm-secrets
            namespace: wasm-af
            package: llm
            interfaces: [inference]

    # Providers must be started separately with `wash provider start` for local dev.
    # See docs/local-dev.md for details.
    - name: http-client
      type: capability
      properties:
        image: ghcr.io/wasmcloud/http-client:0.12.1
      traits:
        - type: spreadscaler
          properties:
            replicas: 1
